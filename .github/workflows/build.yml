name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Version bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  lint:
    runs-on: [ubuntu-latest]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint

  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # See https://github.com/nodejs/release#release-schedule
        node-version: [22, 24, 26]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run test

  publish:
    runs-on: ubuntu-24.04
    needs: [lint, build]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    permissions:
      id-token: write # Required for OIDC trusted publishing
      contents: write # Required to push the version commit/tag and create the release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Need full history to push the version commit and tag
          lfs: true

      # setup-node with registry-url is required for OIDC trusted publishing
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Set up SSH signing
        uses: photostructure/git-ssh-signing-action@eb48d0517cdf304a5fde87d539702a74ebc01e09 # v2.0.0
        with:
          ssh-signing-key: ${{ secrets.SSH_SIGNING_KEY }}
          git-user-name: ${{ secrets.GIT_USER_NAME }}
          git-user-email: ${{ secrets.GIT_USER_EMAIL }}

      - name: Update npm to latest
        run: |
          echo "Current npm version:"
          npm --version
          echo "Updating npm to latest..."
          npm install -g npm@latest
          echo "New npm version:"
          npm --version

      - name: Install dependencies
        run: npm ci

      # The full test matrix already ran in the lint and build jobs; lint here
      # is a final gate on the exact commit being published (npm ci already
      # compiled dist via the prepare script).
      - name: Lint
        run: npm run lint

      - name: Bump version and create tag
        run: |
          npm version "${{ github.event.inputs.version }}" --sign-git-tag -m "Release %s"
          echo "NEW_VERSION=$(npm pkg get version | tr -d '\"')" >> "$GITHUB_ENV"

      - name: Push changes and tags
        run: |
          git push origin HEAD:main
          git push origin --tags

      - name: Create GitHub Release
        run: gh release create "${{ env.NEW_VERSION }}" --title "Release ${{ env.NEW_VERSION }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm with OIDC
        run: npm publish --provenance
